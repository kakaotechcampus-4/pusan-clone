name: Auto-assign reviewer
# PRD-mvp.md §7 (FR-1 ~ FR-5)
# 학생이 학교 repo 에 PR open → 담당 멘토 reviewer 자동 지정. 실패 시 pr-pipeline 에 ops-alert issue.
#
# ⚠️ 이 YAML 은 학생 <user>/final 브랜치에 **박제**된다 (pull_request 는 base 브랜치의 워크플로 정의를
#   실행). 따라서 여기엔 **판정 로직을 두지 않는다** — 전부 workflows/scripts/assign-reviewer.sh 에 있고,
#   그 스크립트는 runtime sparse-checkout 이라 항상 pr-pipeline main 의 최신본이 돈다.
#   → 사이클/게이트/코멘트 문구를 바꿔도 **154개 학생 브랜치 재전파 불요**. (CLAUDE.md 규칙)
#   이 파일 자체(트리거·checkout·env 계약)를 바꿀 때만 setup/31 로 전파할 것.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign:
    runs-on: ubuntu-latest
    # 발화 조건:
    #  - draft 제외 ("리뷰 준비 안 됨" 상태에 reviewer 지정/Discord ping 방지)
    #  - 학생 PR 모양만 (base = "<user>/final"). 배포/운영 PR(→main)·base-template PR 은 skip
    #    → 운영 PR 이 roster 미존재로 실패해 ops-alert 내는 노이즈 차단
    if: >-
      github.event.pull_request.draft == false &&
      endsWith(github.event.pull_request.base.ref, '/final')
    steps:
      - name: Checkout mapping data + scripts
        uses: actions/checkout@v4
        with:
          repository: kakaotechcampus-4/pr-pipeline
          token: ${{ secrets.AUTO_ASSIGN_PAT }}
          path: mapping
          sparse-checkout: |
            data
            workflows/scripts

      - name: Lookup mentor + assign reviewer
        env:
          GH_TOKEN: ${{ secrets.AUTO_ASSIGN_PAT }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          # PR 의 사이클 판정용 — 전역 '현재 사이클' 이 아니라 이 PR 자신의 주차/생성일로 멘토를 정한다.
          # (week2 PR 을 reopen/지각 제출해도 원래 사이클1 멘토가 유지됨)
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
          FEEDBACK_FORM_URL: ${{ vars.FEEDBACK_FORM_URL }}
        run: bash mapping/workflows/scripts/assign-reviewer.sh

      - name: Notify ops on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.AUTO_ASSIGN_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          **PR**: $PR_URL
          **Author**: $PR_AUTHOR
          **Source repo**: $SOURCE_REPO
          **Workflow run**: $RUN_URL

          ---

          Reviewer 자동 지정이 실패했습니다. Workflow 로그에서 \`::error::\` 줄을 확인하세요.

          가능한 원인:
          - 학생이 \`data/student-roster.csv\` 에 없음 (신규 입과 누락)
          - 매칭 멘토가 \`data/cycle-mapping.csv\` 에 없음 (사이클 row 누락)
          - PR 사이클 판정 실패 (\`data/cycle-windows.csv\` 구간 누락)
          - 멘토 GitHub username 오타 (gh API: "Reviewer is not a collaborator")

          처리: roster/매핑 수정 → PR 에 reviewer 수동 추가 → 이 이슈 close.
          EOF
          )
          gh issue create \
            -R kakaotechcampus-4/pr-pipeline \
            -t "[ops-alert] reviewer auto-assign failed: PR by $PR_AUTHOR" \
            -b "$BODY" \
            -l "ops-alert"
